# Nginx configuration to protect backup directory URL paths (defense in depth).
# Add to your server block or include this file from sites-enabled.
#
# Connectors also write a .htaccess inside the backup directory when possible
# (Apache). For httpd-wide rules, see apache_backup_protection.conf.example in
# this directory.

# Deny access to backup directories (legacy apr_* and patcherly_*)
location ~ ^/(.*/)?(backups|\.apr_backups|apr_backups|\.patcherly_backups|patcherly_backups)/ {
    deny all;
    return 403;
}

# Alternative: If backups are outside webroot, no configuration needed
# Ensure backup directories are not within the web root document path

